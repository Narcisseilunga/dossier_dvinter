<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lecture vidéo</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-100 via-blue-50 to-slate-200">

    <div class="container mx-auto px-4 py-10">

        <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-2xl overflow-hidden">

            <!-- En-tête -->
            <div class="bg-blue-700 text-white py-8 px-8">

                <h1 class="text-3xl font-bold text-center">
                    Vidéo protégée
                </h1>

                <p class="text-center text-blue-100 mt-2">
                    Division de l'Intérieur et Sécurité
                </p>

            </div>

            <!-- Contenu -->
            <div class="p-6 md:p-8">

                <video
                    controls
                    controlsList="nodownload"
                    class="w-full rounded-xl shadow-lg border border-gray-300"
                >
                    <source src="{{ url_for('stream') }}" type="video/mp4">
                    Votre navigateur ne supporte pas la lecture des vidéos.
                </video>

                <div class="mt-6 bg-blue-50 border-l-4 border-blue-600 p-4 rounded-lg">
                    <h3 class="font-semibold text-blue-800 mb-2">
                        Informations
                    </h3>

                    <p class="text-gray-700 leading-relaxed">
                        Cette vidéo est réservée aux personnes autorisées.
                        Toute reproduction, copie, capture d'écran ou diffusion
                        non autorisée est strictement interdite.
                    </p>
                </div>

            </div>

            <!-- Pied -->
            <div class="bg-gray-100 border-t px-6 py-4">
                <p class="text-center text-sm text-gray-500">
                    © 2026 - Accès sécurisé
                </p>
            </div>

        </div>

    </div>

</body>
</html>
