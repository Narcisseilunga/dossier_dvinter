<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion sécurisée</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-slate-100 via-blue-50 to-slate-200 flex items-center justify-center px-4">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-2xl overflow-hidden">

        <!-- En-tête -->
        <div class="bg-blue-700 text-white py-6 px-8">

            <div class="flex justify-center mb-4">
                <img
                    src="{{ url_for('uploaded_file', filename='nouveau_logo_prosec.png') }}"
                    alt="Logo PROSEC"
                    class="w-24 h-24 sm:w-28 sm:h-28 object-contain bg-white rounded-full p-2 shadow-lg"
                >
            </div>

            <h1 class="text-2xl font-bold text-center">
                Vidéo protégée
            </h1>

            <p class="text-center text-blue-100 mt-2 text-sm">
                Division de l'Intérieur et Sécurité
            </p>

        </div>

        <!-- Formulaire -->
        <div class="p-8">

            <form method="POST" class="space-y-5">

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">
                        Mot de passe
                    </label>

                    <input
                        type="password"
                        name="password"
                        placeholder="Entrez votre mot de passe"
                        required
                        autofocus
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-blue-600 transition"
                    >
                </div>

                <button
                    type="submit"
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white font-semibold py-3 rounded-lg shadow transition duration-300"
                >
                    Accéder à la vidéo
                </button>

            </form>

            {% if error %}
            <div class="mt-5 bg-red-100 border border-red-300 rounded-lg px-4 py-3">
                <p class="text-center text-red-700 font-medium">
                    {{ error }}
                </p>
            </div>
            {% endif %}

        </div>

        <!-- Pied de page -->
        <div class="bg-gray-100 border-t px-6 py-4">
            <p class="text-center text-xs text-gray-500">
                Accès réservé aux personnes autorisées.
            </p>
            <p class="text-center text-xs text-gray-400 mt-1">
                © 2026 PROSEC - Tous droits réservés.
            </p>
        </div>

    </div>

</body>
</html>
